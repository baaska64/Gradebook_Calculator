<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Ledger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="autosave-status">Saved</div>
    <div id="sync-status" class="sync-status synced">Cloud Synced</div>

    <header class="dashboard">
        <div class="dashboard-header">
            <div class="header-title-container">
                <div>
                    <h1>Grade Ledger</h1>
                    <p class="tagline">Units, weights, and grade equivalents</p>
                </div>
            </div>
            <div id="auth-controls">
                <span id="user-email"></span>
                <!-- Global Grading System Selector -->
                <select id="global-grade-system" class="field field--select" style="margin-right: 8px;">
                    <option value="1_IS_BEST">Grade (1.0 Best)</option>
                    <option value="5_IS_BEST">Grade (5.0 Best)</option>
                    <option value="4_IS_BEST">Grade (4.0 Best)</option>
                    <option value="PERCENT">Percentage</option>
                </select>
                <button id="btn-download" onclick="window.open('https://github.com/baaska64/Gradebook_App/releases/download/v1.0.1/Grade_Ledger.apk')">Download Android App</button>
                <button id="btn-login" class="btn-primary">Login / Signup</button>
                <button id="btn-delete-account" class="btn-danger" style="display: none;">Delete Account</button>
                <button id="btn-logout" class="btn-danger" style="display: none;">Logout</button>
                <button id="btn-reset" class="btn-danger">Reset</button>
                <button id="btn-theme" class="btn-icon" aria-label="Toggle Dark Mode" title="Toggle Theme">
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
            <button id="btn-menu-toggle" class="btn-icon" aria-label="Toggle Menu" title="Toggle Menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
        <div class="gwa-summary" id="gwa-summary"></div>

        <!-- Modals... (Leave auth-modal and confirm-modal as they are) -->
        <div id="auth-modal" class="modal" style="display:none;">
            <div class="modal-content auth-modal-content">
                <h2 id="modal-title">Access your ledger</h2>
                <button id="btn-google-login" class="btn-google">
                    <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Continue with Google
                </button>
                <div class="modal-divider"><span>OR</span></div>
                <input type="email" id="auth-email" class="field field--block" placeholder="Email address">
                <input type="password" id="auth-password" class="field field--block" placeholder="Password">
                <button id="btn-forgot-password" style="font-size: 12px; color: var(--primary); background: none; border: none; padding: 0; margin-bottom: 12px; cursor: pointer; text-decoration: underline;">Forgot Password?</button>
                <div class="modal-actions auth-actions">
                    <button id="btn-submit-login" class="btn-primary">Login</button>
                    <button id="btn-submit-signup">Sign Up</button>
                    <button class="btn-cancel-modal" onclick="toggleModal(false)">Cancel</button>
                </div>
                <p id="auth-message"></p>
            </div>
        </div>

        <div id="confirm-modal" class="modal" style="display:none;">
            <div class="modal-content" style="width: 360px; text-align: center;">
                <h2 style="font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--danger);">Confirm Deletion</h2>
                <p id="confirm-message" style="margin-bottom: 1.25rem; font-size: 0.9rem; color: var(--text-muted);"></p>
                <div class="modal-actions" style="justify-content: center; gap: 0.75rem;">
                    <button id="btn-confirm-cancel">Cancel</button>
                    <button id="btn-confirm-ok" class="btn-danger">Delete Record</button>
                </div>
            </div>
        </div>

        <div id="exclusions-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h2 id="exc-modal-title">Grade Exclusions</h2>
                <p id="exc-modal-desc" style="font-size:13px; color:var(--text-muted); margin-bottom:4px;">Uncheck items you want to temporarily ignore for calculations.</p>
                <div class="exclusions-tree" id="exclusions-tree-content"></div>
                <div class="modal-actions" style="justify-content: space-between;">
                    <button id="btn-exc-reset" style="color: var(--danger); background: transparent; border: 1px solid var(--danger); cursor: pointer; padding: 6px 12px; border-radius: var(--radius-sm); font-size: 13px;">Reset All Exclusions</button>
                    <button id="btn-exc-close" class="btn-primary">Done</button>
                </div>
            </div>
        </div>

        <div id="reset-password-modal" class="modal" style="display:none;">
            <div class="modal-content auth-modal-content">
                <h2>Set New Password</h2>
                <input type="password" id="new-password" class="field field--block" placeholder="New Password" style="margin-bottom: 12px;">
                <div class="modal-actions auth-actions">
                    <button id="btn-submit-reset" class="btn-primary">Update Password</button>
                    <button class="btn-cancel-modal" onclick="document.getElementById('reset-password-modal').style.display='none'">Cancel</button>
                </div>
                <p id="reset-message" style="margin-top: 12px; font-size: 13px; text-align: center; color: var(--text-muted);"></p>
            </div>
        </div>
    </header>

    <main class="ledger-container">
        <nav class="folder-tabs" id="year-tabs"></nav>
        <nav class="folder-tabs sub-tabs" id="sem-tabs"></nav>
        <div class="ledger-paper" id="ledger-content"></div>
    </main>

    <script>
        window.ENV_SUPABASE_URL = null;
        window.ENV_SUPABASE_KEY = null;
    </script>
    <script src="app.js"></script>
</body>
</html>
